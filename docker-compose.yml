services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "${APP_PORT:-80}:80"
      - "${VITE_PORT:-5173}:5173"
    volumes:
      # Mount source for hot reload — code changes reflect instantly
      - .:/var/www/html
      # Persist deps in named volumes (avoid overwrite by host mount)
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY:-}
      - DB_CONNECTION=${DB_CONNECTION:-sqlite}
      - DB_DATABASE=${DB_DATABASE:-/var/www/html/database/database.sqlite}
    restart: unless-stopped

volumes:
  vendor:
  node_modules:
